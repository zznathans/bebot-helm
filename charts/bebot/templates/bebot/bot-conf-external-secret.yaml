{{- range .Values.bebot.instances }}
{{- if eq .createSecret false }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $.Release.Name }}-conf-{{ .name }}
  namespace: {{ $.Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: {{ default "1h" $.Values.bebot.externalSecret.secretRefreshInterval }}
  secretStoreRef:
    name: {{ default "gcp-clusterstore" $.Values.bebot.externalSecret.secretStoreName }}
    kind: {{ default "ClusterSecretStore" $.Values.bebot.externalSecret.secretStoreKind }}
  target:
    name: {{ $.Release.Name }}-conf-{{ .name }}
    creationPolicy: Owner
    template:
      data:
        bot_conf.py: |
          # Auto-generated by the bebot-helm chart. Do not edit by hand --
          # change the instance's values in values.yaml instead.
          ao_username = "{{ .ao_username }}"
          ao_password = "{{"{{"}} .ao_password {{"}}"}}"
          bot_name = "{{ .bot_name }}"
          dimension = "{{ .dimension }}"

          guild = "{{ .guild | default "" }}"
          owner = "{{ .botOwner }}"
          super_admin = {
          {{ range .superAdmins -}}
            "{{ . }}": True,
          {{ end -}}
          }

          guildbot = {{ if .raidbot }}False{{ else }}True{{ end }}
          guild_id = {{ .guildId }}

          log = "{{ .log | default "chat" }}"
          log_path = "./log"
          log_timestamp = "{{ .logTimestamp | default "none" }}"
          log_format = "{{ .logFormat | default "text" }}"

          command_prefix = "{{ .commandPrefix | default "!" }}"
          cron_delay = {{ .cronDelay | default 30 }}
          tell_delay = {{ .tellDelay | default 2222 }}
          reconnect_time = {{ .reconnectTime | default 60 }}
          max_blobsize = 12000
          accessallbots = {{ if .accessAllBots }}True{{ else }}False{{ end }}
          other_bots = {
          {{ range .otherBots -}}
            "{{ . }}": True,
          {{ end -}}
          }

          db_name = "{{"{{"}} .mariadb_database {{"}}"}}"
          db_user = "{{"{{"}} .mariadb_user {{"}}"}}"
          db_password = "{{"{{"}} .mariadb_password {{"}}"}}"
          db_server = "{{ $.Release.Name }}-mariadb"
          {{- if kindIs "string" .tablePrefix }}
          table_prefix = "{{ .tablePrefix }}"
          {{- else }}
          table_prefix = None
          {{- end }}
          {{- if .masterTableName }}
          master_tablename = "{{ .masterTableName }}"
          {{- else }}
          master_tablename = None
          {{- end }}
          no_underscore = {{ if .noUnderscore }}True{{ else }}False{{ end }}
        mariadb_user: "{{"{{"}} .mariadb_user {{"}}"}}"
        mariadb_password: "{{"{{"}} .mariadb_password {{"}}"}}"
        mariadb_database: "{{"{{"}} .mariadb_database {{"}}"}}"
  data:
    - secretKey: ao_password
      remoteRef:
        key: {{ $.Values.bebot.externalSecret.gcpSecretName }}
        property: {{ .name }}_ao_password
        decodingStrategy: None
    - secretKey: mariadb_user
      remoteRef:
        key: {{ $.Values.bebot.externalSecret.gcpSecretName }}
        property: {{ .name }}_mariadb_user
        decodingStrategy: None
    - secretKey: mariadb_password
      remoteRef:
        key: {{ $.Values.bebot.externalSecret.gcpSecretName }}
        property: {{ .name }}_mariadb_password
        decodingStrategy: None
    - secretKey: mariadb_database
      remoteRef:
        key: {{ $.Values.bebot.externalSecret.gcpSecretName }}
        property: {{ .name }}_mariadb_database
        decodingStrategy: None
---
{{- end }}
{{- end }}

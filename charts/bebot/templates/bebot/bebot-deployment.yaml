{{- range .Values.bebot.instances }}
{{- if ne .enabled false }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $.Release.Name }}-{{ .name }}
  namespace: {{ $.Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ $.Release.Name }}-{{ .name }}
  template:
    metadata:
      annotations:
        checksum/conf: {{ toYaml . | sha256sum }}
        {{- if and $.Values.bebot.mariadb.enabled $.Values.bebot.mariadb.dbSetupEnabled }}
        checksum/db-setup: {{ printf "%s:%s" .mariadbDatabase .mariadbUser | sha256sum }}
        {{- end }}
      labels:
        app: {{ $.Release.Name }}-{{ .name }}
    spec:
      serviceAccount: {{ $.Release.Name }}-serviceaccount-{{ .name }}
      {{- if and (eq .createSecret false) $.Values.bebot.mariadb.enabled $.Values.bebot.mariadb.dbSetupEnabled }}
      initContainers:
        - name: db-setup
          image: {{ $.Values.bebot.mariadb.image }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              MYSQL_PWD="${MYSQL_ROOT_PASSWORD}" mariadb -h "${MARIADB_HOST}" -uroot -e "
                CREATE DATABASE IF NOT EXISTS \`${MARIADB_DATABASE}\`;
                CREATE USER IF NOT EXISTS '${MARIADB_USER}'@'%' IDENTIFIED BY '${MARIADB_PASSWORD}';
                ALTER USER '${MARIADB_USER}'@'%' IDENTIFIED BY '${MARIADB_PASSWORD}';
                GRANT ALL PRIVILEGES ON \`${MARIADB_DATABASE}\`.* TO '${MARIADB_USER}'@'%';
                FLUSH PRIVILEGES;
              "
          env:
            - name: MARIADB_HOST
              value: "{{ $.Release.Name }}-mariadb"
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $.Release.Name }}-mariadb-root
                  key: root-password
            - name: MARIADB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ $.Release.Name }}-conf-{{ .name }}
                  key: mariadb_user
            - name: MARIADB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $.Release.Name }}-conf-{{ .name }}
                  key: mariadb_password
            - name: MARIADB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: {{ $.Release.Name }}-conf-{{ .name }}
                  key: mariadb_database
      {{- end }}
      terminationGracePeriodSeconds: {{ $.Values.bebot.terminationGracePeriodSeconds | default 60 }}
      dnsConfig:
        options:
          - name: ndots
            value: "1"
      containers:
        - name: {{ $.Release.Name }}
          image: {{ $.Values.bebot.imageRepository }}:{{ $.Values.bebot.imageTag }}
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 2"]
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: ["ALL"]
          resources:
            {{- toYaml $.Values.bebot.resources | nindent 12 }}
          volumeMounts:
            - name: bebot-conf-secret
              mountPath: /BeBot/Conf
              readOnly: true
      volumes:
        - name: bebot-conf-secret
          secret:
            secretName: {{ $.Release.Name }}-conf-{{ .name }}
            items:
              - key: bot_conf.py
                path: bot_conf.py
---
{{- end }}
{{- end }}

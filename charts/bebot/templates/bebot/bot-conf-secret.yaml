{{- range .Values.bebot.instances }}
{{- if ne .createSecret false }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $.Release.Name }}-conf-{{ .name }}
  namespace: {{ $.Release.Namespace }}
type: Opaque
stringData:
  Mysql.conf: |-
{{ tpl ( $.Files.Get "files/Mysql.conf.dist" ) (dict "raidbot" .raidbot "mariadbUser" (.mariadbUser | default "") "mariadbPassword" (.mariadbPassword | default "") "mariadbDatabase" (.mariadbDatabase | default "") "mariadbHost" (default (printf "%s-mariadb" $.Release.Name) .mariadbHost) ) | indent 4 }}
  Bot.conf: |-
{{ tpl ( $.Files.Get "files/Bot.conf.dist" ) (dict "ao_username" .ao_username "ao_password" (.ao_password | default "") "bot_name" .bot_name "dimension" .dimension "guildId" .guildId "botOwner" .botOwner "superAdmins" .superAdmins ) | indent 4 }}
  mariadb_user: {{ .mariadbUser | default "" | quote }}
  mariadb_password: {{ .mariadbPassword | default "" | quote }}
  mariadb_database: {{ .mariadbDatabase | default "" | quote }}
  Aoaccounts.conf: |-
{{ $.Files.Get "files/Aoaccounts.conf.dist" | indent 4 }}
  ServerList.php: |-
{{ $.Files.Get "files/ServerList.php" | indent 4 }}
---
{{- end }}
{{- end }}

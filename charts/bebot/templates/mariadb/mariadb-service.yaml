{{- if .Values.bebot.mariadb.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-mariadb
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-mariadb
spec:
  type: ClusterIP
  ports:
    - port: 3306
      targetPort: 3306
      name: mysql
    {{- if .Values.bebot.mariadb.metrics.enabled }}
    - port: 9104
      targetPort: 9104
      name: metrics
    {{- end }}
  selector:
    app: {{ .Release.Name }}-mariadb
{{- end }}

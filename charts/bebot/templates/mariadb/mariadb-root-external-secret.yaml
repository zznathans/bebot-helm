{{- if and .Values.bebot.mariadb.enabled (eq .Values.bebot.mariadb.createSecret false) }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Release.Name }}-mariadb-root
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: {{ default "1h" .Values.bebot.externalSecret.secretRefreshInterval }}
  secretStoreRef:
    name: {{ default "gcp-clusterstore" .Values.bebot.externalSecret.secretStoreName }}
    kind: {{ default "ClusterSecretStore" .Values.bebot.externalSecret.secretStoreKind }}
  target:
    name: {{ .Release.Name }}-mariadb-root
    creationPolicy: Owner
  data:
    - secretKey: root-password
      remoteRef:
        key: {{ .Values.bebot.externalSecret.gcpSecretName }}
        property: mariadb_root_password
        decodingStrategy: None
    - secretKey: root-user
      remoteRef:
        key: {{ .Values.bebot.externalSecret.gcpSecretName }}
        property: mariadb_root_user
        decodingStrategy: None
{{- end }}

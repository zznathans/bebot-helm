{{- if and .Values.bebot.mariadb.enabled .Values.bebot.mariadb.backup.enabled }}
{{- if and (eq (.Values.bebot.mariadb.backup.destination | default "pvc") "s3") .Values.bebot.mariadb.backup.s3.externalSecret.enabled }}
{{- $remoteKey := required "bebot.mariadb.backup.s3.externalSecret.secretName is required when externalSecret.enabled is true" .Values.bebot.mariadb.backup.s3.externalSecret.secretName }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Release.Name }}-mariadb-backup-s3-creds
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: {{ default "1h" .Values.bebot.externalSecret.secretRefreshInterval }}
  secretStoreRef:
    name: {{ default "gcp-clusterstore" .Values.bebot.externalSecret.secretStoreName }}
    kind: {{ default "ClusterSecretStore" .Values.bebot.externalSecret.secretStoreKind }}
  target:
    name: {{ .Values.bebot.mariadb.backup.s3.credentialsSecret | default (printf "%s-mariadb-backup-s3-creds" .Release.Name) }}
    creationPolicy: Owner
  data:
    - secretKey: access-key-id
      remoteRef:
        key: {{ $remoteKey }}
        property: access_key
        decodingStrategy: Base64
    - secretKey: secret-access-key
      remoteRef:
        key: {{ $remoteKey }}
        property: secret_key
        decodingStrategy: Base64
    - secretKey: bucket
      remoteRef:
        key: {{ $remoteKey }}
        property: bucket_name
        decodingStrategy: None
    - secretKey: endpoint
      remoteRef:
        key: {{ $remoteKey }}
        property: endpoint
        decodingStrategy: None
{{- end }}
{{- end }}

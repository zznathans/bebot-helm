{{- if .Values.bebot.mariadb.enabled }}
{{- if .Values.bebot.mariadb.perInstance }}
{{- range $i, $instance := .Values.bebot.instances }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $.Release.Name }}-mariadb-{{ $instance.name }}
  labels:
    app: {{ $.Release.Name }}-mariadb-{{ $instance.name }}
spec:
  type: ClusterIP
  ports:
    - port: 3306
      targetPort: 3306
      name: mysql
    {{- if $.Values.bebot.mariadb.metrics.enabled }}
    - port: 9104
      targetPort: 9104
      name: metrics
    {{- end }}
  selector:
    app: {{ $.Release.Name }}-mariadb-{{ $instance.name }}
---
{{- end }}
{{- else }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-mariadb
  labels:
    app: {{ .Release.Name }}-mariadb
spec:
  type: ClusterIP
  ports:
    - port: 3306
      targetPort: 3306
      name: mysql
    {{- if .Values.bebot.mariadb.metrics.enabled }}
    - port: 9104
      targetPort: 9104
      name: metrics
    {{- end }}
  selector:
    app: {{ .Release.Name }}-mariadb
{{- end }}
{{- end }}

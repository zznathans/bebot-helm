{{- if and .Values.bebot.mariadb.enabled (ne .Values.bebot.mariadb.createSecret false) }}
{{- $secretName := printf "%s-mariadb-root" .Release.Name }}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $rootPassword := "" }}
{{- if and $existingSecret $existingSecret.data (index $existingSecret.data "root-password") }}
{{- $rootPassword = index $existingSecret.data "root-password" | b64dec }}
{{- else }}
{{- $rootPassword = randAlphaNum 32 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
type: Opaque
stringData:
  root-password: {{ $rootPassword | quote }}
  root-user: {{ .Values.bebot.mariadb.rootUser | default "root" | quote }}
{{- end }}

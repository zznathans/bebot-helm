{{- if and .Values.bebot.mariadb.enabled .Values.bebot.mariadb.dbSetupEnabled }}
{{- if not .Values.bebot.mariadb.perInstance }}
{{- $hasBakedInstances := false }}
{{- range .Values.bebot.instances }}{{- if ne .createSecret false }}{{- $hasBakedInstances = true }}{{- end }}{{- end }}
{{- if $hasBakedInstances }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-db-setup
  namespace: {{ .Release.Namespace }}
stringData:
{{- range .Values.bebot.instances }}
{{- if ne .createSecret false }}
  db_setup_{{ .name }}.sql: |-
    CREATE DATABASE IF NOT EXISTS `{{ .mariadbDatabase | default "" | b64dec }}`;
    CREATE USER IF NOT EXISTS '{{ .mariadbUser | default "" | b64dec }}'@'%' IDENTIFIED BY '{{ .mariadbPassword | default "" | b64dec }}';
    GRANT ALL PRIVILEGES ON `{{ .mariadbDatabase | default "" | b64dec }}`.* TO '{{ .mariadbUser | default "" | b64dec }}'@'%';
    FLUSH PRIVILEGES;
{{- end }}
{{- end }}
{{- end }}
{{- else }}
{{- range .Values.bebot.instances }}
{{- if ne .createSecret false }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $.Release.Name }}-db-setup-{{ .name }}
  namespace: {{ $.Release.Namespace }}
stringData:
  db_setup.sql: |-
    CREATE DATABASE IF NOT EXISTS `{{ .mariadbDatabase | default "" | b64dec }}`;
    CREATE USER IF NOT EXISTS '{{ .mariadbUser | default "" | b64dec }}'@'%' IDENTIFIED BY '{{ .mariadbPassword | default "" | b64dec }}';
    GRANT ALL PRIVILEGES ON `{{ .mariadbDatabase | default "" | b64dec }}`.* TO '{{ .mariadbUser | default "" | b64dec }}'@'%';
    FLUSH PRIVILEGES;
---
{{- end }}
{{- end }}
{{- end }}
{{- end }}

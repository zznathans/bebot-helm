# Example: Credentials baked into values.yaml
#
# All credentials are stored directly in Helm values and rendered into a
# Kubernetes Secret at install time. Suitable for local or dev deployments
# where a secret store is not available.
#
# WARNING: Do not commit this file with real credentials to source control.
# Use Sealed Secrets, SOPS, or pass credentials via --set / a separate
# values override file kept outside the repo.
#
# Usage:
#   helm install my-bebot . -f examples/values-baked-secrets.yaml

bebot:
  mariadb:
    enabled: true
    perInstance: false
    persistence:
      enabled: true
      size: 2Gi
      storageClass: ""
      accessMode: ReadWriteOnce
    rootUser: "root"
    rootHost: "%"
    dbSetupEnabled: true
    backup:
      enabled: false

    # createSecret is unset (defaults to true) — Helm auto-generates the root
    # password on first install and stores it in a K8s Secret. It is reused
    # on subsequent upgrades via Helm lookup.

  imageRepository: "ghcr.io/my-org/ao-bebot"
  imageTag: "latest"
  imagePullSecrets: []

  instances:
    - name: myguild
      enabled: true
      guildId: 123456
      mariadbUser: "myguilduser"
      mariadbDatabase: "myguilddb"
      ao_username: "my_ao_account"
      bot_name: "MyBotCharacter"
      dimension: "5"
      raidbot: false
      botOwner: "MyOwnerChar"
      superAdmins:
        - "AdminChar1"
        - "AdminChar2"
      # createSecret: true is the default — a K8s Secret is created by Helm.
      # Supply the sensitive values below (or via --set / a separate override file).
      ao_password: "change_me"
      mariadbPassword: "change_me"

  extraObjects: []

# Example: Database backups to an S3-compatible bucket
#
# Dumps each database to a separate .sql file, then uploads the entire dump
# directory to S3 using `aws s3 sync`. No PVC is created — dumps are written
# to an emptyDir and discarded after upload.
#
# Two credential modes are supported:
#
# A) Manual secret — create it yourself, reference it by name:
#   kubectl create secret generic my-s3-creds \
#     --from-literal=access-key-id=AKIA... \
#     --from-literal=secret-access-key=...
#
# B) ExternalSecret — point at a secret in your external store that contains
#    a JSON payload with bucket_name, endpoint, access_key (base64), secret_key (base64).
#    bucket and endpoint are sourced from the secret; bucket/endpoint in values are ignored.
#
# Extend an existing values file with this overlay:
#   helm upgrade my-bebot . \
#     -f examples/values-external-secrets.yaml \
#     -f examples/values-backup-s3.yaml

bebot:
  mariadb:
    backup:
      enabled: true
      schedule: "0 2 * * *"   # 2am daily
      destination: s3
      s3:
        region: us-east-1
        path: backups/bebot
        # image: amazon/aws-cli:2   # override if using a custom S3 CLI image

        # --- Option A: manual credentials secret ---
        # bucket: my-bebot-backups
        # endpoint: ""             # for non-AWS providers (MinIO, Backblaze B2, etc.)
        # credentialsSecret: my-s3-creds   # K8s Secret with access-key-id and secret-access-key

        # --- Option B: ExternalSecret ---
        # bucket, endpoint, access_key, secret_key come from the external secret.
        # The external secret must be a JSON object with those four keys;
        # access_key and secret_key must be base64-encoded within the JSON.
        externalSecret:
          enabled: true
          secretName: my-bebot-s3-creds   # name of the secret in the external store

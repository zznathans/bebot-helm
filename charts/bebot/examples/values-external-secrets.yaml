# Example: Credentials from GCP Secret Manager via ExternalSecrets
#
# All sensitive credentials are pulled at runtime from GCP Secret Manager by
# the external-secrets operator. Nothing sensitive is stored in this file or
# in-cluster ConfigMaps.
#
# Prerequisites:
#   - external-secrets operator installed (https://external-secrets.io)
#   - A ClusterSecretStore named "gcp-clusterstore" configured for your project
#   - GCP secrets pre-populated using tools/generate-gcp-secret.py:
#
#       python tools/generate-gcp-secret.py bot-config | \
#         gcloud secrets versions add my-bebot-myguild --data-file=-
#
#       python tools/generate-gcp-secret.py mariadb-root | \
#         gcloud secrets versions add my-bebot-mariadb-root --data-file=-
#
#       python tools/generate-gcp-secret.py registry | \
#         gcloud secrets versions add my-registry-creds --data-file=-
#
# Usage:
#   helm install my-bebot . -f examples/values-external-secrets.yaml

bebot:
  mariadb:
    enabled: true
    perInstance: false
    persistence:
      enabled: true
      size: 2Gi
      storageClass: ""
      accessMode: ReadWriteOnce
    rootUser: "root"
    rootHost: "%"
    dbSetupEnabled: true
    backup:
      enabled: false
    # Pull root credentials from GCP instead of auto-generating them.
    createSecret: false
    gcpSecretName: my-bebot-mariadb-root   # GCP secret with root-user and root-password keys
    secretStoreName: gcp-clusterstore
    secretStoreKind: ClusterSecretStore
    secretRefreshInterval: 1h

  imageRepository: "ghcr.io/my-org/ao-bebot"
  imageTag: "latest"
  imagePullSecrets:
    - my-regcred

  instances:
    - name: myguild
      enabled: true
      guildId: 123456
      mariadbUser: "myguilduser"     # Still required — used by the db-setup job to create the DB user
      mariadbDatabase: "myguilddb"   # Still required — used by the db-setup job to create the database
      ao_username: "my_ao_account"
      bot_name: "MyBotCharacter"
      dimension: "5"
      raidbot: false
      botOwner: "MyOwnerChar"
      superAdmins:
        - "AdminChar1"
        - "AdminChar2"
      # createSecret: false — an ExternalSecret is created to pull credentials from GCP.
      # The GCP secret must contain: ao_password, mariadb_user, mariadb_password,
      # mariadb_database, mariadb_host
      createSecret: false
      gcpSecretName: my-bebot-myguild
      secretStoreName: gcp-clusterstore
      secretStoreKind: ClusterSecretStore
      secretRefreshInterval: 1h

  # Pull registry credentials from GCP so the node can pull the bebot image.
  extraObjects:
    - apiVersion: external-secrets.io/v1
      kind: ExternalSecret
      metadata:
        name: my-regcred
      spec:
        refreshInterval: 1h
        secretStoreRef:
          name: gcp-clusterstore
          kind: ClusterSecretStore
        target:
          name: my-regcred
          creationPolicy: Owner
          template:
            type: kubernetes.io/dockerconfigjson
            data:
              .dockerconfigjson: "{{ .dockerconfigjson }}"
        data:
          - secretKey: dockerconfigjson
            remoteRef:
              key: my-registry-creds

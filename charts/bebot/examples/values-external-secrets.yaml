# Example: Credentials from GCP Secret Manager via ExternalSecrets
#
# All sensitive credentials are pulled at runtime from GCP Secret Manager by
# the external-secrets operator. Nothing sensitive is stored in this file or
# in-cluster ConfigMaps.
#
# Prerequisites:
#   - external-secrets operator installed (https://external-secrets.io)
#   - A ClusterSecretStore named "gcp-clusterstore" configured for your project
#   - GCP secret pre-populated using tools/generate-gcp-secret.py:
#
#       python tools/generate-gcp-secret.py secrets --print-to-stdout | \
#         gcloud secrets versions add my-bebot-secrets --data-file=-
#
#       python tools/generate-gcp-secret.py registry --print-to-stdout | \
#         gcloud secrets versions add my-registry-creds --data-file=-
#
# Usage:
#   helm install my-bebot . -f examples/values-external-secrets.yaml

bebot:
  # Single upstream secret — all ExternalSecrets in this chart pull from here.
  externalSecret:
    gcpSecretName: my-bebot-secrets
    secretStoreName: gcp-clusterstore
    secretStoreKind: ClusterSecretStore
    secretRefreshInterval: 1h

  mariadb:
    enabled: true
    persistence:
      enabled: true
      size: 2Gi
      storageClass: ""
      accessMode: ReadWriteOnce
    rootUser: "root"
    rootHost: "%"
    dbSetupEnabled: true
    backup:
      enabled: false
    # Pull root credentials from GCP instead of auto-generating them.
    createSecret: false

  imageRepository: "ghcr.io/my-org/ao-bebot"
  imageTag: "latest"
  imagePullSecrets:
    - my-regcred

  instances:
    - name: myguild
      enabled: true
      guildId: 123456
      mariadbUser: "myguilduser"
      mariadbDatabase: "myguilddb"
      ao_username: "my_ao_account"
      bot_name: "MyBotCharacter"
      dimension: "5"
      raidbot: false
      botOwner: "MyOwnerChar"
      superAdmins:
        - "AdminChar1"
        - "AdminChar2"
      # createSecret: false — an ExternalSecret pulls credentials from the
      # upstream secret at bebot.externalSecret, using keys:
      #   myguild_ao_password, myguild_mariadb_user,
      #   myguild_mariadb_password, myguild_mariadb_database
      createSecret: false

  # Pull registry credentials from GCP so the node can pull the bebot image.
  extraObjects:
    - apiVersion: external-secrets.io/v1
      kind: ExternalSecret
      metadata:
        name: my-regcred
      spec:
        refreshInterval: 1h
        secretStoreRef:
          name: gcp-clusterstore
          kind: ClusterSecretStore
        target:
          name: my-regcred
          creationPolicy: Owner
          template:
            type: kubernetes.io/dockerconfigjson
            data:
              .dockerconfigjson: "{{ .dockerconfigjson }}"
        data:
          - secretKey: dockerconfigjson
            remoteRef:
              key: my-registry-creds

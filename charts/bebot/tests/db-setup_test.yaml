suite: db-setup
templates:
  - db-setup.yaml
tests:
  - it: renders a shared Secret in default mode
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-db-setup

  - it: renders nothing when mariadb is disabled
    set:
      bebot.mariadb.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: renders nothing when dbSetupEnabled is false
    set:
      bebot.mariadb.dbSetupEnabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: renders nothing when all instances have createSecret false
    set:
      bebot.instances:
        - name: mybot
          enabled: true
          guildId: 0
          mariadbUser: botuser
          mariadbDatabase: botdb
          ao_username: ao_account
          bot_name: BotCharacter
          dimension: "5"
          raidbot: false
          botOwner: OwnerCharacter
          superAdmins: []
          createSecret: false
    asserts:
      - hasDocuments:
          count: 0

  - it: renders per-instance Secrets when perInstance is true
    set:
      bebot.mariadb.perInstance: true
      bebot.instances:
        - name: bot1
          enabled: true
          guildId: 1
          mariadbUser: user1
          mariadbDatabase: db1
          ao_username: acct1
          bot_name: Bot1
          dimension: "5"
          raidbot: false
          botOwner: Owner1
          superAdmins: []
          createSecret: true
        - name: bot2
          enabled: true
          guildId: 2
          mariadbUser: user2
          mariadbDatabase: db2
          ao_username: acct2
          bot_name: Bot2
          dimension: "5"
          raidbot: false
          botOwner: Owner2
          superAdmins: []
          createSecret: true
    asserts:
      - hasDocuments:
          count: 2

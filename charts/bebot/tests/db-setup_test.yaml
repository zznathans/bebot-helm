suite: db-setup
templates:
  - mariadb/db-setup.yaml
tests:
  - it: renders a shared Secret in default mode
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-db-setup

  - it: renders nothing when mariadb is disabled
    set:
      bebot.mariadb.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: renders nothing when dbSetupEnabled is false
    set:
      bebot.mariadb.dbSetupEnabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: renders nothing when all instances have createSecret false
    set:
      bebot.instances:
        - name: mybot
          enabled: true
          guildId: 0
          mariadbUser: botuser
          mariadbDatabase: botdb
          ao_username: ao_account
          bot_name: BotCharacter
          dimension: "5"
          raidbot: false
          botOwner: OwnerCharacter
          superAdmins: []
          createSecret: false
    asserts:
      - hasDocuments:
          count: 0

suite: mariadb service
templates:
  - mariadb/mariadb-service.yaml
tests:
  - it: renders a single Service by default
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: RELEASE-NAME-mariadb

  - it: renders nothing when mariadb is disabled
    set:
      bebot.mariadb.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: adds metrics port when metrics are enabled
    set:
      bebot.mariadb.metrics.enabled: true
    asserts:
      - contains:
          path: spec.ports
          content:
            port: 9104
            targetPort: 9104
            name: metrics

  - it: only exposes mysql port by default
    asserts:
      - equal:
          path: spec.ports
          value:
            - port: 3306
              targetPort: 3306
              name: mysql

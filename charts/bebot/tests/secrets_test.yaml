suite: baked secrets
templates:
  - bebot/bot-conf-secret.yaml
  - mariadb/mariadb-root-secret.yaml
tests:
  - it: renders a bot config Secret for the default instance
    template: bebot/bot-conf-secret.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-conf-mybot

  - it: renders a Python bot_conf.py key with instance values, not PHP
    template: bebot/bot-conf-secret.yaml
    set:
      bebot.instances:
        - name: mybot
          enabled: true
          guildId: 0
          mariadbUser: botuser
          mariadbDatabase: botdb
          mariadbPassword: dbsecret
          ao_username: ao_account
          ao_password: hunter2
          bot_name: BotCharacter
          dimension: "5"
          raidbot: false
          botOwner: OwnerCharacter
          superAdmins: []
          createSecret: true
    asserts:
      - matchRegex:
          path: stringData["bot_conf.py"]
          pattern: 'ao_username = "ao_account"'
      - matchRegex:
          path: stringData["bot_conf.py"]
          pattern: 'ao_password = "hunter2"'
      - matchRegex:
          path: stringData["bot_conf.py"]
          pattern: 'db_password = "dbsecret"'
      - matchRegex:
          path: stringData["bot_conf.py"]
          pattern: 'db_server = "RELEASE-NAME-mariadb"'
      - notMatchRegex:
          path: stringData["bot_conf.py"]
          pattern: "<\\?php"
      - notExists:
          path: stringData["Bot.conf"]
      - notExists:
          path: stringData["Mysql.conf"]

  - it: does not render bot config Secret when createSecret is false
    template: bebot/bot-conf-secret.yaml
    set:
      bebot.instances:
        - name: mybot
          enabled: true
          guildId: 0
          mariadbUser: botuser
          mariadbDatabase: botdb
          ao_username: ao_account
          bot_name: BotCharacter
          dimension: "5"
          raidbot: false
          botOwner: OwnerCharacter
          superAdmins: []
          createSecret: false
    asserts:
      - hasDocuments:
          count: 0

  - it: renders one bot config Secret per instance
    template: bebot/bot-conf-secret.yaml
    set:
      bebot.instances:
        - name: bot1
          enabled: true
          guildId: 1
          mariadbUser: user1
          mariadbDatabase: db1
          ao_username: acct1
          bot_name: Bot1
          dimension: "5"
          raidbot: false
          botOwner: Owner1
          superAdmins: []
          createSecret: true
        - name: bot2
          enabled: true
          guildId: 2
          mariadbUser: user2
          mariadbDatabase: db2
          ao_username: acct2
          bot_name: Bot2
          dimension: "5"
          raidbot: false
          botOwner: Owner2
          superAdmins: []
          createSecret: true
    asserts:
      - hasDocuments:
          count: 2

  - it: renders a mariadb-root Secret when mariadb is enabled
    template: mariadb/mariadb-root-secret.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-mariadb-root

  - it: does not render mariadb-root Secret when mariadb is disabled
    template: mariadb/mariadb-root-secret.yaml
    set:
      bebot.mariadb.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: does not render mariadb-root Secret when createSecret is false
    template: mariadb/mariadb-root-secret.yaml
    set:
      bebot.mariadb.createSecret: false
    asserts:
      - hasDocuments:
          count: 0

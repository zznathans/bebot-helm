suite: mariadb service monitor
templates:
  - observability/mariadb-servicemonitor.yaml
tests:
  - it: renders nothing when metrics are disabled (default)
    asserts:
      - hasDocuments:
          count: 0

  - it: renders a ServiceMonitor when metrics are enabled
    set:
      bebot.mariadb.metrics.enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ServiceMonitor
      - equal:
          path: metadata.name
          value: RELEASE-NAME-mariadb

  - it: renders nothing when mariadb is disabled even if metrics are enabled
    set:
      bebot.mariadb.enabled: false
      bebot.mariadb.metrics.enabled: true
    asserts:
      - hasDocuments:
          count: 0

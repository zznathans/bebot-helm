suite: mariadb service monitor
templates:
  - mariadb-servicemonitor.yaml
tests:
  - it: renders nothing when metrics are disabled (default)
    asserts:
      - hasDocuments:
          count: 0

  - it: renders a ServiceMonitor when metrics are enabled
    set:
      bebot.mariadb.metrics.enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ServiceMonitor
      - equal:
          path: metadata.name
          value: RELEASE-NAME-mariadb

  - it: renders nothing when mariadb is disabled even if metrics are enabled
    set:
      bebot.mariadb.enabled: false
      bebot.mariadb.metrics.enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: renders per-instance ServiceMonitors when perInstance is true
    set:
      bebot.mariadb.metrics.enabled: true
      bebot.mariadb.perInstance: true
      bebot.instances:
        - name: bot1
          enabled: true
          guildId: 1
          mariadbUser: user1
          mariadbDatabase: db1
          ao_username: acct1
          bot_name: Bot1
          dimension: "5"
          raidbot: false
          botOwner: Owner1
          superAdmins: []
          createSecret: true
        - name: bot2
          enabled: true
          guildId: 2
          mariadbUser: user2
          mariadbDatabase: db2
          ao_username: acct2
          bot_name: Bot2
          dimension: "5"
          raidbot: false
          botOwner: Owner2
          superAdmins: []
          createSecret: true
    asserts:
      - hasDocuments:
          count: 2

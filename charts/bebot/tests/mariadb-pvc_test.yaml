suite: mariadb pvc
templates:
  - mariadb-pvc.yaml
tests:
  - it: renders a PVC by default
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: PersistentVolumeClaim
      - equal:
          path: metadata.name
          value: RELEASE-NAME-mariadb-pvc

  - it: renders nothing when mariadb is disabled
    set:
      bebot.mariadb.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: renders nothing when persistence is disabled
    set:
      bebot.mariadb.persistence.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: uses the configured storage size
    set:
      bebot.mariadb.persistence.size: 10Gi
    asserts:
      - equal:
          path: spec.resources.requests.storage
          value: 10Gi

  - it: sets the resource-policy keep annotation
    asserts:
      - equal:
          path: metadata.annotations["helm.sh/resource-policy"]
          value: keep

  - it: renders per-instance PVCs when perInstance is true
    set:
      bebot.mariadb.perInstance: true
      bebot.instances:
        - name: bot1
          enabled: true
          guildId: 1
          mariadbUser: user1
          mariadbDatabase: db1
          ao_username: acct1
          bot_name: Bot1
          dimension: "5"
          raidbot: false
          botOwner: Owner1
          superAdmins: []
          createSecret: true
        - name: bot2
          enabled: true
          guildId: 2
          mariadbUser: user2
          mariadbDatabase: db2
          ao_username: acct2
          bot_name: Bot2
          dimension: "5"
          raidbot: false
          botOwner: Owner2
          superAdmins: []
          createSecret: true
    asserts:
      - hasDocuments:
          count: 2

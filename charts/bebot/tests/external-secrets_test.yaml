suite: external secrets
templates:
  - bebot/bot-conf-external-secret.yaml
  - mariadb/mariadb-root-external-secret.yaml
  - mariadb/mariadb-backup-s3-external-secret.yaml
tests:
  - it: does not render bot config ExternalSecret by default
    template: bebot/bot-conf-external-secret.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: renders bot config ExternalSecret when createSecret is false
    template: bebot/bot-conf-external-secret.yaml
    set:
      bebot.externalSecret.gcpSecretName: my-bebot-secret
      bebot.instances:
        - name: mybot
          enabled: true
          guildId: 0
          mariadbUser: botuser
          mariadbDatabase: botdb
          ao_username: ao_account
          bot_name: BotCharacter
          dimension: "5"
          raidbot: false
          botOwner: OwnerCharacter
          superAdmins: []
          createSecret: false
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ExternalSecret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-conf-mybot

  - it: uses the configured secretStore for bot config ExternalSecret
    template: bebot/bot-conf-external-secret.yaml
    set:
      bebot.externalSecret.gcpSecretName: my-bebot-secret
      bebot.externalSecret.secretStoreName: my-store
      bebot.externalSecret.secretStoreKind: SecretStore
      bebot.instances:
        - name: mybot
          enabled: true
          guildId: 0
          mariadbUser: botuser
          mariadbDatabase: botdb
          ao_username: ao_account
          bot_name: BotCharacter
          dimension: "5"
          raidbot: false
          botOwner: OwnerCharacter
          superAdmins: []
          createSecret: false
    asserts:
      - equal:
          path: spec.secretStoreRef.name
          value: my-store
      - equal:
          path: spec.secretStoreRef.kind
          value: SecretStore

  - it: uses instance-name-prefixed property keys in remote refs
    template: bebot/bot-conf-external-secret.yaml
    set:
      bebot.externalSecret.gcpSecretName: my-bebot-secret
      bebot.instances:
        - name: mybot
          enabled: true
          guildId: 0
          mariadbUser: botuser
          mariadbDatabase: botdb
          ao_username: ao_account
          bot_name: BotCharacter
          dimension: "5"
          raidbot: false
          botOwner: OwnerCharacter
          superAdmins: []
          createSecret: false
    asserts:
      - equal:
          path: spec.data[0].remoteRef.property
          value: mybot_ao_password
      - equal:
          path: spec.data[1].remoteRef.property
          value: mybot_mariadb_user

  - it: does not render mariadb-root ExternalSecret by default
    template: mariadb/mariadb-root-external-secret.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: renders mariadb-root ExternalSecret when createSecret is false
    template: mariadb/mariadb-root-external-secret.yaml
    set:
      bebot.mariadb.createSecret: false
      bebot.externalSecret.gcpSecretName: my-bebot-secret
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ExternalSecret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-mariadb-root

  - it: renders nothing for mariadb-root ExternalSecret when mariadb is disabled
    template: mariadb/mariadb-root-external-secret.yaml
    set:
      bebot.mariadb.enabled: false
      bebot.mariadb.createSecret: false
    asserts:
      - hasDocuments:
          count: 0

  - it: renders nothing for s3 ExternalSecret when backup is disabled
    template: mariadb/mariadb-backup-s3-external-secret.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: renders nothing for s3 ExternalSecret when externalSecret is disabled
    template: mariadb/mariadb-backup-s3-external-secret.yaml
    set:
      bebot.mariadb.backup.enabled: true
      bebot.mariadb.backup.destination: s3
      bebot.mariadb.backup.s3.bucket: my-bucket
      bebot.mariadb.backup.s3.externalSecret.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: renders s3 ExternalSecret when backup and externalSecret are enabled
    template: mariadb/mariadb-backup-s3-external-secret.yaml
    set:
      bebot.externalSecret.gcpSecretName: my-bebot-secret
      bebot.mariadb.backup.enabled: true
      bebot.mariadb.backup.destination: s3
      bebot.mariadb.backup.s3.bucket: my-bucket
      bebot.mariadb.backup.s3.externalSecret.enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ExternalSecret

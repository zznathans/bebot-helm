suite: mariadb deployment
templates:
  - mariadb/mariadb-deployment.yaml
tests:
  - it: renders a single shared Deployment by default
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: RELEASE-NAME-mariadb

  - it: renders nothing when mariadb is disabled
    set:
      bebot.mariadb.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: uses the configured mariadb image
    set:
      bebot.mariadb.image: mariadb:10.11
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: mariadb:10.11

  - it: includes metrics sidecar when metrics are enabled
    set:
      bebot.mariadb.metrics.enabled: true
    asserts:
      - equal:
          path: spec.template.spec.containers[1].name
          value: mysqld-exporter

  - it: does not include metrics sidecar by default
    asserts:
      - notExists:
          path: spec.template.spec.containers[1]

  - it: mounts persistence volume when persistence is enabled
    asserts:
      - isNotEmpty:
          path: spec.template.spec.volumes

  - it: does not mount persistence volume when persistence is disabled
    set:
      bebot.mariadb.persistence.enabled: false
    asserts:
      - notExists:
          path: spec.template.spec.volumes

suite: service account
templates:
  - service-account.yaml
tests:
  - it: renders a ServiceAccount for the default instance
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: RELEASE-NAME-serviceaccount-mybot

  - it: renders one ServiceAccount per instance
    set:
      bebot.instances:
        - name: bot1
          enabled: true
          guildId: 1
          mariadbUser: user1
          mariadbDatabase: db1
          ao_username: acct1
          bot_name: Bot1
          dimension: "5"
          raidbot: false
          botOwner: Owner1
          superAdmins: []
          createSecret: true
        - name: bot2
          enabled: true
          guildId: 2
          mariadbUser: user2
          mariadbDatabase: db2
          ao_username: acct2
          bot_name: Bot2
          dimension: "5"
          raidbot: false
          botOwner: Owner2
          superAdmins: []
          createSecret: true
    asserts:
      - hasDocuments:
          count: 2

  - it: includes imagePullSecrets when configured
    set:
      bebot.imagePullSecrets:
        - my-regcred
    asserts:
      - contains:
          path: imagePullSecrets
          content:
            name: my-regcred

  - it: does not include imagePullSecrets by default
    asserts:
      - notExists:
          path: imagePullSecrets

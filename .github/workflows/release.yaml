name: Release

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

permissions:
  # Minimum needed to generate the app installation token.
  # All write operations (push, release, PR comments) are performed
  # using the app token, not GITHUB_TOKEN.
  contents: read

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    # Only run when CI passed, and skip the bot's own release commits.
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      !contains(github.event.workflow_run.head_commit.message, '[skip ci]')
    steps:
      # Generate a short-lived installation token from a GitHub App.
      # This avoids storing a long-lived PAT and allows bypassing branch
      # protection rules when the app is added as a bypass actor.
      #
      # Prerequisites:
      #   1. Create a GitHub App with permissions:
      #        Contents: read/write, Pull requests: read/write,
      #        Issues: read/write, Metadata: read
      #   2. Install the app on this repository.
      #   3. Store the App ID as repository variable RELEASE_APP_ID.
      #   4. Store the private key (.pem contents) as secret RELEASE_APP_PRIVATE_KEY.
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v7
        with:
          # Full history is required for semantic-release to walk commits.
          fetch-depth: 0
          # Check out the branch by name so git tracking is set up correctly.
          # Checking out by SHA (head_sha) creates a detached HEAD with no
          # tracking ref, which causes semantic-release to report "behind remote."
          ref: main
          # Use the app token so pushed commits/tags are attributed to the app
          # and can satisfy branch protection bypass rules.
          token: ${{ steps.app-token.outputs.token }}

      - uses: ./.github/actions/install-helm-docs

      - uses: cycjimmy/semantic-release-action@v6
        with:
          semantic_version: 25
          extra_plugins: |
            @semantic-release/changelog@6
            @semantic-release/exec@7
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Sync README to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages
          git checkout gh-pages
          git checkout main -- README.md
          if git diff --cached --quiet; then
            echo "README.md unchanged, skipping commit"
          else
            git commit -m "docs: sync README from main [skip ci]"
            git push origin gh-pages
          fi

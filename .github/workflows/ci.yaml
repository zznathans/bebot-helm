name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]

jobs:
  pylint:
    name: Pylint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: charts/bebot/tools/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r charts/bebot/tools/requirements-dev.txt

      - name: Run pylint
        run: pylint charts/bebot/tools/generate-gcp-secret.py --fail-under=8.0

  yamllint:
    name: Yamllint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install yamllint
        run: pip install yamllint

      - name: Run yamllint
        run: yamllint -c .yamllint.yaml .

  pytest:
    name: Pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: charts/bebot/tools/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r charts/bebot/tools/requirements-dev.txt

      - name: Run tests
        run: pytest charts/bebot/tools/tests/ -v

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Run helm lint
        run: helm lint charts/bebot --strict

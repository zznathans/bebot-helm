name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]

jobs:
  pylint:
    name: Pylint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: charts/bebot/tools/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r charts/bebot/tools/requirements-dev.txt

      - name: Run pylint
        run: pylint charts/bebot/tools/generate-gcp-secret.py --fail-under=8.0

  yamllint:
    name: Yamllint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install yamllint
        run: pip install yamllint

      - name: Run yamllint
        run: yamllint -c .yamllint.yaml .

  pytest:
    name: Pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: charts/bebot/tools/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r charts/bebot/tools/requirements-dev.txt

      - name: Run tests
        run: pytest charts/bebot/tools/tests/ -v

  helm-lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: azure/setup-helm@v5
        with:
          version: "3.17.0"

      - name: Run helm lint
        run: helm lint charts/bebot --strict

  helm-docs:
    name: Helm Docs
    runs-on: ubuntu-latest
    # Write permission is needed to push the auto-generated VALUES.md back to
    # the branch. On PRs from forks this permission is unavailable, so the job
    # falls back to failing with a diff instead of pushing.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          # Checkout the real branch so we can push back to it.
          # GITHUB_TOKEN is used here; for branch-protected main the release
          # workflow handles regeneration via the GitHub App token instead.
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: ./.github/actions/install-helm-docs

      - name: Run helm-docs
        run: helm-docs --template-files VALUES.md.gotmpl --output-file VALUES.md --chart-search-root charts

      - name: Commit and push if VALUES.md changed
        run: |
          if ! git diff --quiet charts/bebot/VALUES.md; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add charts/bebot/VALUES.md
            git commit -m "docs: regenerate VALUES.md [skip ci]"
            git push
          fi

  helm-unittest:
    name: Helm Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: azure/setup-helm@v5
        with:
          version: "3.17.0"

      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version v0.6.2

      - name: Run helm unit tests
        run: helm unittest charts/bebot

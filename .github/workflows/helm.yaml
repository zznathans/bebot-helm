name: Release Charts

on:
  workflow_run:
    workflows: ["Docker"]
    types: [completed]

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    # Only publish the chart when the Docker image built and scanned successfully.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "$GITHUB_ACTOR"
          git config --global user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        with:
          pages_branch: gh-pages
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Checkout gh-pages
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages

      - name: Copy README to gh-pages
        run: cp README.md gh-pages/README.md

      - name: Commit and push README
        working-directory: gh-pages
        run: |
          git add README.md
          git diff --cached --quiet && echo "README unchanged, skipping commit" && exit 0
          git commit -m "docs: update README from main"
          git push
